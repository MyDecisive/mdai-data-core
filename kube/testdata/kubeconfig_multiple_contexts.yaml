apiVersion: v1
kind: Config
clusters:
- cluster:
    server: https://cluster1:6443
    insecure-skip-tls-verify: true
  name: cluster1
- cluster:
    server: https://cluster2:6443
    insecure-skip-tls-verify: true
  name: cluster2
contexts:
- context:
    cluster: cluster1
    user: user1
  name: context1
- context:
    cluster: cluster2
    user: user2
  name: context2
current-context: context2
users:
- name: user1
  user:
    token: token1
- name: user2
  user:
    token: token2
